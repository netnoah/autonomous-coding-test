<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Victory Screen Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    /* Import the victory screen styles from index.css */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', 'Courier New', monospace;
    }

    /* Victory gradient background animation */
    @keyframes victoryGradient {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Victory title glow animation */
    @keyframes victoryTitleGlow {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 30px rgba(255, 215, 0, 0.8));
      }
      50% {
        filter: brightness(1.2) drop-shadow(0 0 50px rgba(255, 215, 0, 1));
      }
    }

    /* Score pulse animation */
    @keyframes scorePulse {
      0%, 100% {
        transform: scale(1);
        filter: brightness(1);
      }
      50% {
        transform: scale(1.05);
        filter: brightness(1.2);
      }
    }

    /* Sparkle effect */
    @keyframes sparkle {
      0%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Confetti animation */
    @keyframes confettiFall {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg) translateX(100px);
        opacity: 0.6;
      }
    }

    /* Victory card animation */
    @keyframes victoryCardAppear {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(-50px);
      }
      60% {
        transform: scale(1.05) translateY(10px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Trophy bounce */
    @keyframes trophyBounce {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      25% {
        transform: translateY(-10px) rotate(-5deg);
      }
      50% {
        transform: translateY(-15px) rotate(0deg);
      }
      75% {
        transform: translateY(-10px) rotate(5deg);
      }
    }

    .victory-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      overflow: hidden;
    }

    .victory-sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                  0 0 20px rgba(255, 215, 0, 0.6);
    }

    .victory-confetti {
      position: absolute;
      animation: confettiFall linear infinite;
      opacity: 0.8;
      border-radius: 2px;
    }

    .victory-card {
      position: relative;
      z-index: 10;
      animation: victoryCardAppear 0.6s ease-out;
    }

    .victory-title {
      animation: victoryTitleGlow 2s ease-in-out infinite;
    }

    .victory-button {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .victory-button:hover {
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Sample final stats
    const finalStats = {
      floor: 10,
      monstersKilled: 45,
      steps: 1250,
      hp: 2500,
      atk: 120,
      def: 95,
      gold: 3500
    };

    // Calculate score
    const calculateScore = () => {
      const floorBonus = finalStats.floor * 1000;
      const monsterBonus = finalStats.monstersKilled * 100;
      const goldBonus = finalStats.gold * 10;
      const stepPenalty = Math.floor(finalStats.steps / 10);
      const score = floorBonus + monsterBonus + goldBonus + 10000 - stepPenalty;
      return Math.max(score, 0);
    };

    const score = calculateScore();

    // Generate confetti
    const confettiPieces = Array.from({ length: 50 }, (_, i) => ({
      id: i,
      left: `${Math.random() * 100}%`,
      animationDelay: `${Math.random() * 3}s`,
      animationDuration: `${3 + Math.random() * 2}s`,
      color: ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8'][Math.floor(Math.random() * 6)],
      size: `${10 + Math.random() * 10}px`
    }));

    // Generate sparkles
    const sparkles = Array.from({ length: 30 }, (_, i) => ({
      id: i,
      left: `${Math.random() * 100}%`,
      top: `${Math.random() * 100}%`,
      animationDelay: `${Math.random() * 2}s`,
      animationDuration: `${2 + Math.random() * 2}s`
    }));

    // Build the victory screen HTML
    const victoryHTML = `
      <div class="victory-screen">
        <!-- Animated gradient background -->
        <div class="absolute inset-0 bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900"
             style="background-size: 400% 400%; animation: victoryGradient 10s ease infinite;"></div>

        <!-- Sparkle effect overlay -->
        <div class="absolute inset-0 opacity-30 pointer-events-none">
          ${sparkles.map(sparkle => `
            <div class="victory-sparkle"
                 style="left: ${sparkle.left}; top: ${sparkle.top}; animation-delay: ${sparkle.animationDelay}; animation-duration: ${sparkle.animationDuration};">
            </div>
          `).join('')}
        </div>

        <!-- Confetti animation -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden">
          ${confettiPieces.map(piece => `
            <div class="victory-confetti"
                 style="left: ${piece.left}; top: -20px; width: ${piece.size}; height: ${piece.size}; background-color: ${piece.color}; animation-delay: ${piece.animationDelay}; animation-duration: ${piece.animationDuration};">
            </div>
          `).join('')}
        </div>

        <!-- Main content card -->
        <div class="victory-card relative bg-gradient-to-br from-gray-800/95 to-gray-900/95 backdrop-blur-sm rounded-2xl p-8 max-w-2xl w-full mx-4 text-center border-4 border-yellow-500 shadow-2xl">
          <!-- Animated border glow -->
          <div class="absolute inset-0 rounded-2xl border-4 border-yellow-400 animate-pulse opacity-50 blur-sm"></div>

          <!-- Trophy and title -->
          <div class="relative mb-6">
            <div class="text-7xl mb-4" style="animation: trophyBounce 2s ease-in-out infinite;">
              🏆
            </div>
            <h1 class="victory-title text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500 mb-2">
              VICTORY!
            </h1>
            <h2 class="text-2xl font-bold text-yellow-300 mb-4 animate-pulse">
              🎉 Tower Conquered! 🎉
            </h2>
          </div>

          <!-- Congratulations message -->
          <div class="text-gray-200 mb-6 bg-gradient-to-r from-yellow-900/30 to-transparent p-4 rounded-lg border border-yellow-700/30">
            <p class="text-lg font-semibold">
              ✨ Congratulations, Hero! ✨
            </p>
            <p class="text-gray-300 mt-2">
              You have defeated the Tower Lord and conquered all ${finalStats.floor} floors!
              Your legend will be remembered for ages.
            </p>
          </div>

          <!-- Final Stats -->
          <div class="bg-gradient-to-br from-gray-900/80 to-gray-800/80 rounded-xl p-6 mb-6 border-2 border-yellow-600/50">
            <h2 class="text-2xl font-bold text-yellow-400 mb-4 flex items-center justify-center gap-2">
              <span class="text-2xl">📊</span>
              Final Stats
              <span class="text-2xl">📊</span>
            </h2>

            <div class="grid grid-cols-2 gap-3 text-left mb-4">
              <div class="flex items-center gap-2">
                <span class="text-blue-400">🏢</span>
                <span class="text-gray-400">Floors Cleared:</span>
              </div>
              <div class="font-mono text-white font-bold text-lg">${finalStats.floor}/10</div>

              <div class="flex items-center gap-2">
                <span class="text-red-400">⚔️</span>
                <span class="text-gray-400">Monsters Defeated:</span>
              </div>
              <div class="font-mono text-white font-bold text-lg">${finalStats.monstersKilled}</div>

              <div class="flex items-center gap-2">
                <span class="text-green-400">👟</span>
                <span class="text-gray-400">Steps Taken:</span>
              </div>
              <div class="font-mono text-white font-bold text-lg">${finalStats.steps}</div>

              <div class="flex items-center gap-2">
                <span class="text-pink-400">❤️</span>
                <span class="text-gray-400">Final HP:</span>
              </div>
              <div class="font-mono text-green-400 font-bold text-lg">${finalStats.hp}</div>

              <div class="flex items-center gap-2">
                <span class="text-orange-400">⚔️</span>
                <span class="text-gray-400">Final ATK:</span>
              </div>
              <div class="font-mono text-orange-400 font-bold text-lg">${finalStats.atk}</div>

              <div class="flex items-center gap-2">
                <span class="text-cyan-400">🛡️</span>
                <span class="text-gray-400">Final DEF:</span>
              </div>
              <div class="font-mono text-blue-400 font-bold text-lg">${finalStats.def}</div>

              <div class="flex items-center gap-2">
                <span class="text-yellow-400">💰</span>
                <span class="text-gray-400">Gold Collected:</span>
              </div>
              <div class="font-mono text-yellow-400 font-bold text-lg">${finalStats.gold}</div>
            </div>

            <!-- Score with special styling -->
            <div class="border-t-2 border-yellow-600/50 pt-4 mt-4 bg-gradient-to-r from-yellow-900/20 to-transparent rounded-lg p-4">
              <div class="text-gray-300 text-xl mb-2 font-semibold">⭐ Final Score ⭐</div>
              <div class="font-mono text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500 text-5xl font-bold"
                  style="animation: scorePulse 1s ease-in-out infinite;">
                ${score.toLocaleString()}
              </div>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="flex flex-col gap-3">
            <button class="victory-button px-8 py-4 bg-gradient-to-r from-green-600 via-green-500 to-green-600 text-white font-bold text-lg rounded-xl">
              🔄 Play Again (New Game+)
            </button>

            <button class="victory-button px-8 py-4 bg-gradient-to-r from-gray-600 via-gray-500 to-gray-600 text-white font-bold text-lg rounded-xl">
              🏠 Return to Main Menu
            </button>
          </div>

          <!-- Footer message -->
          <div class="mt-6 text-gray-400 text-sm space-y-1">
            <p class="flex items-center justify-center gap-2">
              <span class="text-xl">🎮</span>
              <span>Thank you for playing Magic Tower!</span>
              <span class="text-xl">🎮</span>
            </p>
            <p class="text-gray-500 text-xs">
              Your heroic deeds will be celebrated throughout the land!
            </p>
          </div>
        </div>
      </div>
    `;

    document.getElementById('root').innerHTML = victoryHTML;
  </script>
</body>
</html>
